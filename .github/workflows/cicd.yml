name: Deploy OmniGuide (RAG Assistant)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------- GHCR LOGIN ----------------
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      # ---------------- BUILD & PUSH BACKEND ----------------
      - name: Build and Push Backend Image
        run: |
          USER=$(echo "${{ secrets.GHCR_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          BACKEND_IMAGE=ghcr.io/$USER/omniguide-backend:latest

          docker build -t $BACKEND_IMAGE -f backend/Dockerfile .
          docker push $BACKEND_IMAGE

      # ---------------- BUILD & PUSH FRONTEND ----------------
      - name: Build and Push Frontend Image
        run: |
          USER=$(echo "${{ secrets.GHCR_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          FRONTEND_IMAGE=ghcr.io/$USER/omniguide-frontend:latest

          docker build -t $FRONTEND_IMAGE ./frontend
          docker push $FRONTEND_IMAGE

      # ---------------- DEPLOY ----------------
      - name: Deploy to Server
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -e

            USER=$(echo "$GHCR_USERNAME" | tr '[:upper:]' '[:lower:]')

            BACKEND_IMAGE=ghcr.io/$USER/omniguide-backend:latest
            FRONTEND_IMAGE=ghcr.io/$USER/omniguide-frontend:latest

            APP_DIR=~/omniguide

            echo "Login to GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            echo "Create app directory"
            mkdir -p $APP_DIR
            cd $APP_DIR

            echo "Write docker-compose.yml"
            cat > docker-compose.yml <<EOF
            version: "3.9"

            services:
              backend:
                image: $BACKEND_IMAGE
                ports:
                  - "0.0.0.0:8950:8000"
                volumes:
                  - ./backend_data:/app/data
                environment:
                  - OLLAMA_HOST=http://host.docker.internal:11434
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s

              frontend:
                image: $FRONTEND_IMAGE
                ports:
                  - "0.0.0.0:8951:80"
                depends_on:
                  backend:
                    condition: service_healthy
            EOF

            echo "Pull latest images"
            docker compose pull

            echo "Restart services"
            docker compose down
            docker compose up -d

            echo "Wait for backend"
            for i in 1 2 3 4 5 6; do
              sleep 10
              curl -sf http://localhost:8950/health && break
              echo "Backend not ready yet ($i/6)..."
              if [ "$i" = "6" ]; then
                echo "Backend failed"
                docker compose logs backend
                exit 1
              fi
            done

            echo "Verify frontend"
            curl -f http://localhost:8951/ || exit 1

            
            echo "OmniGuide deployed successfully 🎉"